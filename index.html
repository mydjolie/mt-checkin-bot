<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MT Check-in</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: #06C755;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }

    .profile-box {
      background: #f8fafc;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #e0e7ef;
      object-fit: cover;
      flex-shrink: 0;
    }

    .profile-info .label {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .profile-info .name {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .status-box {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #166534;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .status-box.error {
      background: #fff1f2;
      border-color: #fecdd3;
      color: #9f1239;
    }

    .status-box.warning {
      background: #fffbeb;
      border-color: #fde68a;
      color: #92400e;
    }

    .status-box.loading {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1e40af;
    }

    .btn-stamp {
      width: 100%;
      padding: 18px;
      background: #06C755;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }

    .btn-stamp:active {
      transform: scale(0.97);
      background: #05a847;
    }

    .btn-stamp:disabled {
      background: #d1d5db;
      color: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }

    .time-display {
      font-size: 36px;
      font-weight: 700;
      color: #1a1a2e;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .date-display {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }

    .success-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .success-title {
      font-size: 22px;
      font-weight: 700;
      color: #166534;
      margin-bottom: 8px;
    }

    .success-detail {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }

    #successCard { display: none; }
  </style>
</head>
<body>

<div class="card" id="mainCard">
  <div class="logo">📍</div>
  <div class="title">MT Check-in</div>
  <div class="subtitle">ระบบลงเวลาเข้างาน</div>

  <div class="time-display" id="clockDisplay">--:--</div>
  <div class="date-display" id="dateDisplay">กำลังโหลด...</div>

  <div class="profile-box">
    <img class="avatar" id="userAvatar" src="" alt="avatar" onerror="this.style.display='none'">
    <div class="profile-info">
      <div class="label">พนักงาน</div>
      <div class="name" id="userName">กำลังโหลดโปรไฟล์...</div>
    </div>
  </div>

  <div class="status-box loading" id="statusBox">
    ⏳ กำลังเริ่มต้นระบบ...
  </div>

  <button class="btn-stamp" id="stampBtn" onclick="processStamp()" disabled>
    📍 สแตมป์เวลาเข้างาน
  </button>
</div>

<div class="card" id="successCard">
  <div class="success-icon">✅</div>
  <div class="success-title">ลงเวลาสำเร็จ!</div>
  <div class="success-detail" id="successDetail"></div>
</div>

<script>
  // =============================================
  // CONFIG — แก้ค่าตรงนี้
  // =============================================
  const LIFF_ID = "2010366667-MfXxtvVD";
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz6FfOt9IIf2BM8Q0McqbC4EFqiteIzO80g54wywJI5QF1KigVFLJA-xtx_k971y-uh/exec"; // ← ใส่ URL จาก Apps Script
  const TARGET_CONFIG = {
    projectName: "MT Check-in",
    latitude: 13.49291,    // ← พิกัดที่ทำงาน (ดึงจาก Config Sheet ได้)
    longitude: 100.25061,
    maxRadiusMeters: 1000
  };
  // =============================================

  let userProfile = { userId: "", displayName: "", pictureUrl: "" };

  // นาฬิกา Real-time
  function updateClock() {
    const now = new Date();
    const time = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Bangkok' });
    const date = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'Asia/Bangkok' });
    document.getElementById('clockDisplay').innerText = time;
    document.getElementById('dateDisplay').innerText = date;
  }
  updateClock();
  setInterval(updateClock, 1000);

  function setStatus(msg, type = 'default') {
    const box = document.getElementById('statusBox');
    box.innerText = msg;
    box.className = 'status-box ' + type;
  }

  // Init LIFF
  liff.init({ liffId: LIFF_ID })
    .then(() => {
      if (!liff.isLoggedIn()) {
        liff.login();
      } else {
        return liff.getProfile();
      }
    })
    .then((profile) => {
      if (profile) {
        userProfile.userId = profile.userId;
        userProfile.displayName = profile.displayName;
        userProfile.pictureUrl = profile.pictureUrl;
        document.getElementById('userName').innerText = profile.displayName;
        document.getElementById('userAvatar').src = profile.pictureUrl;
        document.getElementById('stampBtn').disabled = false;
        setStatus('✅ ระบบพร้อมใช้งาน');
      }
    })
    .catch((err) => {
      setStatus('❌ LIFF Error: ' + err.message, 'error');
    });

  // Process Stamp
  function processStamp() {
    document.getElementById('stampBtn').disabled = true;
    setStatus('📡 กำลังตรวจสอบพิกัด GPS...', 'loading');

    if (!navigator.geolocation) {
      setStatus('❌ อุปกรณ์ไม่รองรับ GPS', 'error');
      document.getElementById('stampBtn').disabled = false;
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (position) => {
        const uLat = position.coords.latitude;
        const uLon = position.coords.longitude;
        const distance = calculateDistance(uLat, uLon, TARGET_CONFIG.latitude, TARGET_CONFIG.longitude);

        if (distance > TARGET_CONFIG.maxRadiusMeters) {
          setStatus(`❌ อยู่นอกพื้นที่ ${Math.round(distance)} เมตร (อนุญาต ${TARGET_CONFIG.maxRadiusMeters} เมตร)`, 'error');
          document.getElementById('stampBtn').disabled = false;
          return;
        }

        setStatus('📤 กำลังบันทึกข้อมูล...', 'loading');

        const payload = {
          projectName: TARGET_CONFIG.projectName,
          lineUserId: userProfile.userId,
          employeeName: userProfile.displayName,
          latitude: uLat,
          longitude: uLon,
          distanceCalculated: Math.round(distance)
        };

        fetch(WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
          if (data.status === "success") {
            document.getElementById('mainCard').style.display = 'none';
            document.getElementById('successCard').style.display = 'block';
            const now = new Date();
            const time = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Bangkok' });
            document.getElementById('successDetail').innerHTML =
              `👤 ${userProfile.displayName}<br>🕐 ${time}<br>📍 ระยะห่าง ${Math.round(distance)} เมตร`;
            setTimeout(() => liff.closeWindow(), 3000);
          } else {
            throw new Error(data.message);
          }
        })
        .catch(err => {
          setStatus('❌ บันทึกไม่สำเร็จ: ' + err.message, 'error');
          document.getElementById('stampBtn').disabled = false;
        });
      },
      (error) => {
        setStatus('❌ ดึง GPS ไม่ได้ กรุณาเปิด Location', 'error');
        document.getElementById('stampBtn').disabled = false;
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  }

  function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) ** 2 +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
</script>
</body>
</html>
